services:
  web-server:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web-server
    ports:
      - "80:80"
    depends_on:
      - db-server
    environment:
      DB_HOST: db-server
      DB_NAME: kamsis_db
      DB_USER: root
      DB_PASS: root123

  db-server:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: db-server
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: kamsis_db
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
